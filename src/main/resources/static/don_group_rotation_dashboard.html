<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donor Groups Dashboard</title>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f6f7fb;
        padding: 20px;
      }

      h1 {
        margin-bottom: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 18px;
      }

      .card {
        background: white;
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      }

      .card h3 {
        margin-bottom: 6px;
      }

      .child {
        font-size: 13px;
        color: #666;
        margin-bottom: 12px;
      }

      .section-title {
        font-size: 12px;
        color: gray;
        margin-bottom: 6px;
      }

      .donor {
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 10px;
      }

      .main {
        background: #e8f8ef;
        border-left: 5px solid #1e7e4a;
      }

      .backup {
        background: #fff8e1;
        border-left: 5px solid #c67c00;
      }

      .donor-name {
        font-weight: bold;
        font-size: 14px;
      }

      .donor-info {
        font-size: 12px;
        color: #555;
      }

      .empty {
        color: gray;
        font-size: 13px;
      }
    </style>
  </head>

  <body>
    <h1>Donor Groups Dashboard</h1>

    <div id="groups" class="grid"></div>

    <script>
      const BASE = "http://localhost:9090";
      let groups = [];

      async function loadGroups() {
        try {
          const res = await fetch(BASE + `/donGroup/all/24`);
          groups = await res.json();

          render();
        } catch (e) {
          console.error(e);
        }
      }

      function getCurrentDonors(group) {
        const donors = group.donors || [];
        const index = group.orderIndex || 0;

        const result = [];

        if (donors[index]) {
          result.push({ ...donors[index], type: "current" });
        }

        if (donors[index + 3]) {
          result.push({ ...donors[index + 3], type: "backup" });
        }

        return result;
      }

      function render() {
        const container = document.getElementById("groups");

        if (!groups.length) {
          container.innerHTML = "<p>No groups found</p>";
          return;
        }

        container.innerHTML = groups
          .map((g) => {
            const donors = getCurrentDonors(g);

            let donorUI = "";

            if (!donors.length) {
              donorUI = `<div class="empty">No donors available</div>`;
            } else {
              donorUI = donors
                .map(
                  (d) => `
        <div class="donor ${d.type === "current" ? "main" : "backup"}">
          <div class="donor-name">
            ${d.type === "current" ? "⭐ Current Donor" : "🔁 Backup Donor"}
          </div>
          <div class="donor-info">
            Name: ${d.name}<br/>
            Blood Type: ${d.bloodType || "-"}<br/>
            Email:${d.email}<br/>
            Phone:${d.phone}<br/>

          </div>
        </div>
      `,
                )
                .join("");
            }

            return `
      <div class="card">
        <h3>${g.child?.name || "Child"}</h3>

           <div class="child">
                👶 Child: ${g.child?.name || "-"} <br/>
                🩸 Blood: ${g.child?.bloodType || "-"} <br/>
                👥 Donors: ${g.donorsCount}
              </div>


        <div class="section-title">Current Assignment</div>

        ${donorUI}
      </div>
    `;
          })
          .join("");
      }

      loadGroups();
    </script>
  </body>
</html>
