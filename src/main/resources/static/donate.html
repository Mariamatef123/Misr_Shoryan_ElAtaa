<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>شريان العطاء - تسجيل متبرع</title>
    <link rel="stylesheet" href="CSS/style.css" />

    <style>
      .content-box {
        max-width: 600px;
        margin: 40px auto;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      input,
      select,
      .radio-group {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-sizing: border-box;
      }

      h3 {
        color: #c62828;
        border-bottom: 2px solid #eee;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }

      h4 {
        margin: 15px 0 5px 0;
        color: #555;
        text-align: right;
      }

      .hidden {
        display: none;
      }

      .btn-submit-step {
        width: 100%;
        padding: 15px;
        background: #c62828;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 17px;
        font-weight: bold;
      }

      .radio-container {
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
        background: #f9f9f9;
        padding: 10px;
        border-radius: 8px;
      }

      .radio-container label {
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .alert-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 0;
        transition: opacity 0.25s;
        pointer-events: none;
      }
      .alert-overlay.show {
        opacity: 1;
        pointer-events: all;
      }
      .alert-box {
        background: white;
        border-radius: 16px;
        padding: 2rem 2rem 1.5rem;
        width: 90%;
        max-width: 340px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        transform: scale(0.85);
        transition: transform 0.25s;
      }
      .alert-overlay.show .alert-box {
        transform: scale(1);
      }

      .alert-icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
        font-size: 30px;
      }
      .alert-icon.success {
        background: #eaf3de;
        color: #3b6d11;
      }
      .alert-icon.error {
        background: #fcebeb;
        color: #a32d2d;
      }

      .alert-title {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 8px;
        color: #1a1a1a;
      }
      .alert-message {
        font-size: 14px;
        color: #666;
        margin-bottom: 1.5rem;
        line-height: 1.6;
      }
      .alert-btn {
        width: 100%;
        padding: 11px;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: opacity 0.2s;
        color: white;
      }
      .alert-btn:hover {
        opacity: 0.85;
      }
      .alert-btn.success {
        background: #c62828;
      }
      .alert-btn.error {
        background: #a32d2d;
      }
    </style>
  </head>

  <body>
    <nav class="navbar">
      <div class="logo-container">
        <img src="Images/logo.jpg" style="height: 50px" alt="Logo" />
      </div>
      <a href="index.html" class="nav-item">الرئيسية</a>
    </nav>

    <div class="content-box">
      <!-- novalidate prevents browser native validation on dynamic inputs -->
      <form id="donateForm" novalidate>
        <!-- STEP 1 -->
        <div id="step1">
          <h3>بيانات المتبرع (1/3)</h3>

          <input type="text" id="name" placeholder="الاسم الكامل" />
          <input type="text" id="city" placeholder="المدينة" />
          <input type="text" id="age" placeholder="العمر" />
          <input type="email" id="email" placeholder="البريد الإلكتروني" />
          <input
            type="tel"
            id="phone"
            placeholder="رقم التليفون"
            style="direction: rtl; text-align: right"
          />

          <select id="bloodType">
            <option value="" disabled selected>اختر فصيلة الدم</option>
          </select>

          <select id="donorType">
            <option value="" disabled selected>اختر نوع التبرع</option>
          </select>

          <button
            type="button"
            class="btn-submit-step"
            onclick="validateStep1()"
          >
            التالي
          </button>
        </div>

        <!-- STEP 2 -->
        <div id="step2" class="hidden">
          <h3>البيانات الصحية (2/3)</h3>

          <div id="dynamic-questions"></div>

          <button
            type="button"
            onclick="submitMedical()"
            class="btn-submit-step"
          >
            التالي
          </button>
        </div>

        <!-- STEP 3 -->
        <div id="step3" class="hidden" style="text-align: center">
          <h3>تم القبول.. اختر الموعد (3/3)</h3>

          <p style="margin-bottom: 20px; color: #666">
            برجاء تحديد تاريخ مناسب لزيارة المركز
          </p>

          <input type="date" id="appointmentDate" name="appointmentDate" />
          <p style="color: #a32d2d; direction: rtl">
            <b> موقع المستشفي : </b>
            مستشفي الدمرداش التابعة لجامعة عين شمس بالعباسية
          </p>

          <button type="button" class="btn-submit-step" onclick="finalSubmit()">
            تأكيد الحجز النهائي
          </button>
        </div>
      </form>
    </div>

    <!-- Alert Modal -->
    <div class="alert-overlay" id="alertOverlay">
      <div class="alert-box">
        <div class="alert-icon" id="alertIcon"></div>
        <div class="alert-title" id="alertTitle"></div>
        <div class="alert-message" id="alertMessage"></div>
        <button class="alert-btn" id="alertBtn" onclick="closeAlert()"></button>
      </div>
    </div>

    <script>
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const minDate = tomorrow.toISOString().split("T")[0]; // "2026-04-15"
      document.getElementById("appointmentDate").min = minDate;
      /* =========================
         STEP NAVIGATION
      ========================= */
      function goToStep(stepNumber) {
        document.getElementById("step1").classList.add("hidden");
        document.getElementById("step2").classList.add("hidden");
        document.getElementById("step3").classList.add("hidden");
        document.getElementById("step" + stepNumber).classList.remove("hidden");
      }

      /* =========================
         STEP 1 VALIDATION
      ========================= */
      function validateStep1() {
        const name = document.getElementById("name").value.trim();
        const city = document.getElementById("city").value.trim();
        const age = document.getElementById("age").value.trim();
        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const bloodType = document.getElementById("bloodType").value;
        const donorType = document.getElementById("donorType").value;

        if (
          !name ||
          !city ||
          !age ||
          !email ||
          !phone ||
          !bloodType ||
          !donorType
        ) {
          showAlert(
            "error",
            "خطأ",
            "برجاء ملء جميع الحقول المطلوبة",
            "حسناً",
            null,
            false,
          );
          return;
        }

        const ageNum = parseInt(age);
        if (isNaN(ageNum) || ageNum < 18 || ageNum > 65) {
          showAlert(
            "error",
            "خطأ",
            "العمر يجب أن يكون بين 18 و65 سنة",
            "حسناً",
            null,
            false,
          );
          return;
        }

        goToStep(2);
      }

      /* =========================
         FINAL SUBMIT (STEP 3)
      ========================= */
      function finalSubmit() {
        const date = document.getElementById("appointmentDate").value;
        if (!date) {
          showAlert(
            "error",
            "خطأ",
            "برجاء اختيار التاريخ",
            "حسناً",
            null,
            false,
          );
          return;
        }

        createDonor();
      }

      /* =========================
         CREATE DONOR API CALL
      ========================= */
      async function createDonor() {
        const donorData = {
          name: document.getElementById("name").value,
          city: document.getElementById("city").value,
          email: document.getElementById("email").value,
          phone: document.getElementById("phone").value,
          bloodType: document.getElementById("bloodType").value,
          donationType: document.getElementById("donorType").value,
          checkUP: document.getElementById("appointmentDate").value,
          age: parseInt(document.getElementById("age").value),
        };

        try {
          const res = await fetch("http://localhost:9090/donor", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(donorData),
          });

          if (!res.ok) throw new Error("Failed to create donor");

          showAlert(
            "success",
            "تم التسجيل!",
            "تم حجز ميعاد في مستشفي الدمرداش التابعة لجامعه عين شمس بالعباسية",
            "حسناً",
            () => {
              window.location.href = "index.html";
            },
            true, // redirect on close
          );
        } catch (error) {
          console.error("Error creating donor:", error);
          showAlert(
            "error",
            "خطأ",
            "حدث خطأ أثناء تسجيل المتبرع.",
            "حسناً",
            null,
            false,
          );
        }
      }

      /* =========================
         LOAD SELECT OPTIONS
      ========================= */
      async function loadSelectOptions() {
        try {
          const [bloodRes, donorRes] = await Promise.all([
            fetch("http://localhost:9090/BloodTypes"),
            fetch("http://localhost:9090/donorTypes"),
          ]);

          const bloodTypes = await bloodRes.json();
          const donorTypes = await donorRes.json();

          const bloodSelect = document.getElementById("bloodType");
          bloodTypes.forEach((type) => {
            const option = document.createElement("option");
            option.value = type;
            option.textContent = type;
            bloodSelect.appendChild(option);
          });

          const donorSelect = document.getElementById("donorType");
          donorTypes.forEach((type) => {
            const option = document.createElement("option");
            option.value = type;
            option.textContent = type;
            donorSelect.appendChild(option);
          });
        } catch (error) {
          console.error("Failed to load select options:", error);
        }
      }

      /* =========================
         QUESTIONS STATE
      ========================= */
      let allQuestions = [];
      let answers = {};

      /* =========================
         LOAD QUESTIONS
      ========================= */
      async function loadQuestions() {
        try {
          const res = await fetch("http://localhost:9090/questions");
          allQuestions = await res.json();
          renderQuestions();
        } catch (error) {
          console.error("Failed to load questions:", error);
        }
      }

      /* =========================
         SHOULD SHOW (dependency logic)
      ========================= */
      function shouldShow(q) {
        if (!q.dependsOnQuestionId) return true;
        const parentAnswer = answers[q.dependsOnQuestionId];
        if (!parentAnswer) return false;
        return parentAnswer === "Yes";
      }

      /* =========================
         RENDER QUESTIONS
      ========================= */
      function renderQuestions() {
        const container = document.getElementById("dynamic-questions");
        container.innerHTML = "";

        allQuestions.forEach((q) => {
          if (!shouldShow(q)) return;

          let html = "";

          /* YES / NO */
          if (q.type === "YES_NO") {
            const current = answers[q.id];
            html = `
              <div class="question">
                <h4>${q.title}</h4>
                <div class="radio-container">
                  <label>
                    <input
                      type="radio"
                      name="q_${q.id}"
                      value="Yes"
                      onchange="handleAnswer(${q.id}, 'Yes')"
                      ${current === "Yes" ? "checked" : ""}
                    />
                    نعم
                  </label>
                  <label>
                    <input
                      type="radio"
                      name="q_${q.id}"
                      value="No"
                      onchange="handleAnswer(${q.id}, 'No')"
                      ${current === "No" ? "checked" : ""}
                    />
                    لا
                  </label>
                </div>
              </div>
            `;
          }

          /* NUMBER */
          if (q.type === "NUMBER") {
            const current = answers[q.id] || "";
            html = `
              <div class="question">
                <h4>${q.title}</h4>
                <input
                  type="number"
                  name="q_${q.id}"
                  value="${current}"
                  data-id="${q.id}"
                  placeholder="${q.title}"
                  min="${q.minValue ?? ""}"
                  max="${q.maxValue ?? ""}"
                  onchange="handleAnswer(${q.id}, this.value)"
                />
              </div>
            `;
          }

          container.insertAdjacentHTML("beforeend", html);
        });
      }

      /* =========================
         HANDLE ANSWER
      ========================= */
      function handleAnswer(id, value) {
        answers[id] = value;
        renderQuestions();
      }

      /* =========================
         SUBMIT MEDICAL (STEP 2)
      ========================= */
      function submitMedical() {
        fetch("http://localhost:9090/validate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ answers }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.eligible) {
              goToStep(3);
            } else {
              showAlert(
                "error",
                "غير مؤهل",
                data.message,
                "شكراً لمحاولتك لإنقاذ حياة الآخرين",
                null,
                true, // redirect to index after closing
              );
            }
          })
          .catch((err) => {
            console.error(err);
            showAlert(
              "error",
              "خطأ",
              "حدث خطأ في الاتصال بالسيرفر",
              "حسناً",
              null,
              false,
            );
          });
      }

      /* =========================
         ALERT SYSTEM
         redirectOnClose: true  → go to index.html after closing
         redirectOnClose: false → just close the alert, stay on page
      ========================= */
      let alertCallback = null;
      let alertShouldRedirect = false;

      function showAlert(
        type,
        title,
        message,
        btnText,
        callback,
        redirectOnClose,
      ) {
        document.getElementById("alertIcon").className = "alert-icon " + type;
        document.getElementById("alertIcon").textContent =
          type === "success" ? "✓" : "✕";

        document.getElementById("alertTitle").textContent = title;
        document.getElementById("alertMessage").textContent = message;
        document.getElementById("alertBtn").textContent = btnText;
        document.getElementById("alertBtn").className = "alert-btn " + type;

        alertCallback = callback || null;
        alertShouldRedirect = !!redirectOnClose;

        document.getElementById("alertOverlay").classList.add("show");
      }

      /* =========================
         CLOSE ALERT
      ========================= */
      function closeAlert() {
        document.getElementById("alertOverlay").classList.remove("show");

        if (alertCallback) {
          alertCallback();
          alertCallback = null;
          return;
        }

        if (alertShouldRedirect) {
          window.location.href = "index.html";
        }
      }

      /* =========================
         INIT
      ========================= */
      loadSelectOptions();
      loadQuestions();
    </script>
  </body>
</html>
