<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شريان العطاء - تسجيل متبرع</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .content-box { max-width: 600px; margin: 40px auto; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, select, .radio-group { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        h3 { color: #c62828; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        h4 { margin: 15px 0 5px 0; color: #555; text-align: right; }
        .hidden { display: none; }
        .btn-submit-step { width: 100%; padding: 15px; background: #c62828; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 17px; font-weight: bold; }
        .radio-container { display: flex; gap: 20px; margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .radio-container label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo-container">
            <img src="logo.jpg" style="height: 50px;" alt="Logo">
        </div>
        <a href="index.html" class="nav-item">الرئيسية</a>
    </nav>

    <div class="content-box">
        <form id="donateForm">
            <div id="step1">
                <h3>بيانات المتبرع (1/3)</h3>
                <input type="text" id="name" placeholder="الاسم الكامل" required>
                <input type="text" id="city" placeholder="المدينة" required>
                <input type="email" id="email" placeholder="البريد الإلكتروني" required>
                <input type="tel" id="phone" placeholder="رقم التليفون" required>
                
                <select id="bloodType" required>
                    <option value="">اختر فصيلة الدم</option>
                    <option>A+</option><option>A-</option>
                    <option>B+</option><option>B-</option>
                    <option>AB+</option><option>AB-</option>
                    <option>O+</option><option>O-</option>
                </select>
                
                <button type="button" class="btn-submit-step" onclick="goToStep(2)">التالي</button>
            </div>

            <div id="step2" class="hidden">
                <h3>البيانات الصحية (2/3)</h3>
                
                <h4>هل تعاني من أي أمراض مزمنة؟</h4>
                <div class="radio-container">
                    <label><input type="radio" name="chronic" value="yes"> نعم</label>
                    <label><input type="radio" name="chronic" value="no" checked> لا</label>
                </div>

                <input type="number" id="hemoglobin" placeholder="نسبة الهيموجلوبين" required>

                <h4>القياسات الحيوية</h4>
                <input type="number" id="sugar" placeholder="نسبة السكر" required>
                <input type="number" id="pressure" placeholder="ضغط الدم" required>
                <input type="number" id="heartRate" placeholder="نبض القلب" required>

                <h4>بيانات إضافية</h4>
                <input type="number" id="weight" placeholder="الوزن (كجم)" required>
                
                <select id="donorType" required>
                    <option value="">نوع التبرع</option>
                    <option value="regular">متبرع منتظم</option>
                    <option value="once">لمرة واحدة فقط</option>
                </select>

                <button type="button" class="btn-submit-step" onclick="goToStep(3)">التالي</button>
            </div>

            <div id="step3" class="hidden" style="text-align: center;">
                <h3>تم القبول.. اختر الموعد (3/3)</h3>
                <p style="margin-bottom: 20px; color: #666;">برجاء تحديد تاريخ مناسب لزيارة المركز</p>
                <input type="date" id="appointmentDate" required>
                
                <button type="submit" class="btn-submit-step">تأكيد الحجز النهائي</button>
            </div>
        </form>
    </div>

    <script>
      
        function goToStep(stepNumber) {
         
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');

           
            document.getElementById('step' + stepNumber).classList.remove('hidden');
        }

   
        document.getElementById('donateForm').onsubmit = function(e) {
            e.preventDefault();

         
            const date = document.getElementById('appointmentDate').value;
            if(!date) {
                alert("برجاء اختيار التاريخ");
                return;
            }

          
            alert("تم تسجيل بيانات التبرع بنجاح! شكراً لإنقاذك حياة الآخرين.");

            
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1200);
        };
    </script>
</body>
</html>
