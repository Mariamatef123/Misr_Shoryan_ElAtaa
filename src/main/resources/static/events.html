<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>الفعاليات</title>
    <link rel="stylesheet" href="CSS/style.css" />
    <style>
      .campaign-card {
        background: #fff5f5;
        padding: 15px; 
        border-radius: 12px;
        margin-bottom: 15px;
      }
    </style>
  </head>

  <body>
    <nav class="navbar">
      <div class="logo-container">
        <img src="Images/logo.jpg" style="height: 45px" /> </div>
        <!-- <h1 class="hadeer">شريان العطاء</h1> -->
        <!-- <span class="heart-icon">❤️</span> -->
      <a href="index.html" class="nav-item">الرئيسية</a>
    </nav>
    <div class="content-box">
      <h1>الفعاليات القادمة</h1>
      <p>حملاتنا تجوب المحافظات والجامعات لنشر الوعي وسد احتياجات المرضى.</p>
      <div class="images-grid-3">
        <img height="160px" src="Images/event1.jpg" class="grid-img" /> <img height="160px" src="Images/event2.jpg" class="grid-img" />
        <img height="160px" src="Images/event3.jpg" class="grid-img" />
      </div>
      <div id="campaigns-container" class="campaigns-container"></div>
    </div>
    <script>
      async function showEventDetails() {
        try {
          const res = await fetch("http://localhost:9090/campaigns");

          if (!res.ok) throw new Error("Failed to fetch campaigns");

          const campaigns = await res.json();

          const container = document.getElementById("campaigns-container");
          container.innerHTML = "";

          campaigns
            .filter((c) => c.isActivated)
            .forEach((campaign) => {
              const div = document.createElement("div");
              div.classList.add("campaign-card");

              const formattedDate = new Date(campaign.date).toLocaleDateString(
                "ar-EG",
                {
                  year: "numeric",
                  month: "long",
                  day: "numeric",
                },
              );

              div.innerHTML = `
            <b style="font-size: 16px;">${campaign.title}</b>
            <p style="font-size: 14px;">${campaign.description}</p>
            <p style="font-size: 13px;">
              📅 ${formattedDate} <br>
              📍 ${campaign.location}
            </p>
            
          `;

              container.appendChild(div);
            });
        } catch (error) {
          console.error(error);
        }
      }

      showEventDetails();
    </script>
  </body>
</html>
