<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - شريان العطاء</title>
    <link rel="stylesheet" href="style.css">
    <style>
       
        .content-box {
            max-width: 400px;
            text-align: center;
            margin: 80px auto;
            padding: 30px;
            border: 1px solid #eee;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box; 
        }
        .btn-submit-step {
            width: 100%;
            padding: 12px;
            background-color: #c62828;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-submit-step:hover {
            background-color: #b71c1c;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo-container">
            <img src="logo.jpg" style="height: 50px;" alt="Logo">
        </div>
        <a href="index.html" class="nav-item">الرئيسية</a>
    </nav>

    <div class="content-box">
        <h3 style="margin-bottom: 25px; color: #333;">تسجيل الدخول</h3>
        
        <form id="loginForm">
            <input type="text" id="userName" placeholder="الاسم بالكامل" required>
            
            <input type="email" id="userEmail" placeholder="البريد الإلكتروني" required>
            
            <input type="password" id="userPassword" placeholder="الرقم السري" required>
            
            <button type="submit" class="btn-submit-step">دخول</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
          
            e.preventDefault();

            const name = document.getElementById('userName').value;

            alert("تم تسجيل الدخول بنجاح! أهلاً بك يا " + name);

            setTimeout(function() {
                window.location.href = "index.html";
            }, 1000);
        };
    </script>
</body>
</html>
