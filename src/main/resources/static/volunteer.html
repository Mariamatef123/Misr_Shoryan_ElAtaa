      .calendar-grid,

        border-color: #a5d6a7;
      }
      .disabled {

        color: #9e9e9e;

        opacity: 0.6;
      }
      .selected {
        background-color: #c62828 !important;
        color: white !important;
        border-color: #b71c1c;
        transform: scale(1.05);
      }
      .hidden {
        display: none;
      }

    <script>
      let selectedSlot = null;

      async function loadSlots() {
        try {
          const response = await fetch("http://localhost:9090/slots");

          if (!response.ok) {
            throw new Error("Failed to fetch slots");
          }

          const data = await response.json();
          console.log("Slots:", data);

          const container = document.getElementById("slotsContainer");
          container.innerHTML = "";

          data.forEach((slot) => {
            const div = document.createElement("div");
            div.className = "item-box";

            if (slot.status === "AVAILABLE") {
              div.classList.add("available");

              div.onclick = () => selectSlot(div, slot);
            } else {
              div.classList.add("disabled");
            }

            div.innerHTML = `
              <div>${slot.slotDate}</div>
              <div>${slot.slotTime}</div>
            `;

            container.appendChild(div);
          });
        } catch (error) {
          console.error("Error loading slots:", error);
          alert("فشل تحميل المواعيد");
        }
      }

      function selectSlot(element, slot) {
        clearSelection("#slotsContainer .item-box");

        element.classList.add("selected");
        selectedSlot = slot;

        console.log("Selected slot:", selectedSlot);
      }

      function clearSelection(selector) {
        document
          .querySelectorAll(selector)
          .forEach((item) => item.classList.remove("selected"));
      }

      document.getElementById("volunteerForm").onsubmit = async function (e) {
        e.preventDefault();

        if (!selectedSlot) {
          alert("من فضلك اختر موعد المقابلة أولاً");
          return;
        }

        const name = document.getElementById("userName").value.trim();
        const email = document.getElementById("userEmail").value.trim();

        console.log("Email sent:", email);

        const submitBtn = document.querySelector(".btn-submit-step");
        submitBtn.disabled = true;
        submitBtn.innerText = "جاري الحجز...";

        try {
          const createResponse = await fetch(
            "http://localhost:9090/create-volunteer",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                name: name,
                universityEmail: email,
              }),
            },
          );

          const text = await createResponse.text();

          let createResult;
          try {
            createResult = JSON.parse(text);
          } catch {
            createResult = text;
          }

          if (!createResponse.ok) {
            throw new Error(
              typeof createResult === "string"
                ? createResult
                : createResult.message || "Error creating volunteer",
            );
          }

          console.log("Volunteer created:", createResult);

          const chooseResponse = await fetch(
            `http://localhost:9090/volunteer/${createResult.id}/choose-slot/${selectedSlot.interviewSlotID}`,
            {
              method: "POST",
            },
          );

          if (!chooseResponse.ok) {
            throw new Error("فشل حجز الموعد");
          }

          alert("تم حجز الموعد بنجاح");
          window.location.href = "index.html";
          document.getElementById("volunteerForm").reset();
          selectedSlot = null;
          clearSelection("#slotsContainer .item-box");
        } catch (error) {
          console.error("Error:", error);
          alert(error.message || "حدث خطأ");
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerText = "إرسال طلب التطوع";
        }
      };

      window.onload = loadSlots;
    </script>
