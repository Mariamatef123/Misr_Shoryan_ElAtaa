<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شريان العطاء - تطوع معنا</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .calendar-grid, .time-slots {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .item-box {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .available {
            background-color: #e8f5e9;
            color: #2e7d32;
            border-color: #a5d6a7;
        }
        .disabled {
            background-color: #f5f5f5;
            color: #9e9e9e;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .selected {
            background-color: #c62828 !important;
            color: white !important;
            border-color: #b71c1c;
            transform: scale(1.05);
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo-container">
            <img src="logo.jpg" style="height: 50px;" alt="Logo">
              <!-- <h1 class="hadeer">شريان العطاء</h1> 
              <span class="heart-icon">❤️</span> -->
        </div>
        <a href="index.html" class="nav-item">الرئيسية</a>
    </nav>

    <div class="content-box">
        <h1 style="text-align: center;">كن شرياناً للحياة.. تطوع معنا!</h1>
        <p style="text-align: center; color: #666;">"تطوعك هو أمل جديد لطفل مريض."</p>
        
        <form id="volunteerForm" style="max-width: 600px; margin: 20px auto;">
            <input type="text" id="userName" placeholder="الاسم" required style="width: 100%; padding: 10px; margin-bottom: 10px;">
            <input type="text" id="userYear" placeholder="السنة الدراسية" required style="width: 100%; padding: 10px; margin-bottom: 10px;">
            <input type="email" id="userEmail" placeholder="الايميل الجامعي" required style="width: 100%; padding: 10px; margin-bottom: 10px;">
            
            <h3>1. اختر الشهر</h3>
            <div id="monthPicker" class="calendar-grid"></div>

            <div id="daySection" class="hidden">
                <h3>2. اختر اليوم</h3>
                <div id="dayPicker" class="calendar-grid"></div>
            </div>

            <div id="timeSection" class="hidden">
                <h3>3. اختر موعد المقابلة</h3>
                <div id="timePicker" class="time-slots"></div>
            </div>

            <button type="submit" class="btn-submit-step" style="margin-top: 20px; width: 100%; padding: 15px; background: #c62828; color: white; border: none; border-radius: 5px; cursor: pointer;">
                إرسال طلب التطوع
            </button>
        </form>
    </div>

    <script>
        const months = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
        const timeSlots = [
                       "01:00 ص", "02:00 ص", "03:00 ص", "04:00 ص", "05:00 ص", "06:00 ص",
                         "07:00 ص","08:00 ص","09:00 ص","10:00 ص","11:00 ص","12:00 ص",
                       "01:00 م", "02:00 م", "03:00 م", "04:00 م", "05:00 م", "06:00 م",
                         "07:00 م","08:00 م","09:00 م","10:00 م","11:00 م","12:00 م"

        ];

        
        function initApp() {
            const monthContainer = document.getElementById('monthPicker');
            months.forEach((m, index) => {
                const div = document.createElement('div');
                div.className = 'item-box available';
                div.innerText = m;
                div.onclick = () => selectMonth(div, index);
                monthContainer.appendChild(div);
            });
        }

      
        function selectMonth(el, monthIdx) {
            clearSelection('#monthPicker .item-box');
            el.classList.add('selected');
            
            document.getElementById('daySection').classList.remove('hidden');
            const dayContainer = document.getElementById('dayPicker');
            dayContainer.innerHTML = ''; 

            for (let i = 1; i <= 30; i++) {
                const dayDiv = document.createElement('div');
         
                const isDisabled = (i % 5 === 0); 
                dayDiv.className = `item-box ${isDisabled ? 'disabled' : 'available'}`;
                dayDiv.innerText = i;
                if (!isDisabled) {
                    dayDiv.onclick = () => selectDay(dayDiv, i);
                }
                dayContainer.appendChild(dayDiv);
            }
        }

        function selectDay(el, dayNum) {
            clearSelection('#dayPicker .item-box');
            el.classList.add('selected');
            
            document.getElementById('timeSection').classList.remove('hidden');
            const timeContainer = document.getElementById('timePicker');
            timeContainer.innerHTML = '';

            timeSlots.forEach(slot => {
                const slotDiv = document.createElement('div');
                slotDiv.className = 'item-box available';
                slotDiv.innerText = slot;
                slotDiv.onclick = () => {
                    clearSelection('#timePicker .item-box');
                    slotDiv.classList.add('selected');
                };
                timeContainer.appendChild(slotDiv);
            });
        }

        function clearSelection(selector) {
            document.querySelectorAll(selector).forEach(item => item.classList.remove('selected'));
        }

        
        document.getElementById('volunteerForm').onsubmit = function(e) {
            e.preventDefault();
            
           
            const selectedMonth = document.querySelector('#monthPicker .selected');
            const selectedDay = document.querySelector('#dayPicker .selected');
            const selectedTime = document.querySelector('#timePicker .selected');

            if (!selectedMonth || !selectedDay || !selectedTime) {
                alert("من فضلك اختر الشهر واليوم والوقت أولاً");
                return;
            }

            alert("تم التسجيل بنجاح! سيتم توجيهك للصفحة الرئيسية.");
            
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1500);
        };

        window.onload = initApp;
    </script>
</body>
</html>
