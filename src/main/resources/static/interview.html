<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview System</title>

    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --sidebar-w: 230px;

        /* Background */
        --bg: #fff0f5; /* pink very light */

        /* Sidebar */
        --sidebar-bg: #2b1a24;
        --sidebar-hover: #3a2430;
        --sidebar-active: #4a2d3d;

        /* Main color */
        --accent: #ff4f8b; /* pink main */

        /* Text */
        --text-main: #2a1a22;
        --text-muted: #a07a8c;

        /* Cards */
        --card-bg: #ffffff;
        --border: #f3d6e2;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        display: flex;
      }

      /* Sidebar */
      .sidebar {
        width: var(--sidebar-w);
        min-height: 100vh;
        background: var(--sidebar-bg);
        display: flex;
        flex-direction: column;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
      }

      .sidebar-logo {
        padding: 24px 20px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .sidebar-logo h2 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 18px;
        font-weight: 700;
        color: #fff;
        letter-spacing: 0.3px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo-icon {
        width: 32px;
        height: 32px;
        background: var(--accent);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }

      .sidebar-nav {
        flex: 1;
        padding: 16px 12px;
      }

      .nav-label {
        font-size: 10px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 1.2px;
        text-transform: uppercase;
        padding: 0 8px;
        margin-bottom: 8px;
        margin-top: 16px;
      }

      .nav-label:first-child {
        margin-top: 0;
      }
      .sidebar ul {
        list-style: none;
      }

      .sidebar li {
        display: flex;
        align-items: center;

        gap: 11px;
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.55);
        transition: var(--transition);
        margin-bottom: 2px;
        position: relative;
      }

      .sidebar li:hover {
        background: var(--sidebar-hover);
        color: rgba(255, 255, 255, 0.85);
      }

      .sidebar li.active {
        background: var(--sidebar-active);
        color: #fff;
      }

      .sidebar li.active::before {
        content: "";
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 3px;
        height: 60%;
        background: var(--accent);
        border-radius: 0 3px 3px 0;
      }

      .nav-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        opacity: 0.7;
      }
      .sidebar li.active .nav-icon,
      .sidebar li:hover .nav-icon {
        opacity: 1;
      }

      .sidebar-footer {
        padding: 16px 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }

      .sidebar-footer {
        padding: 16px 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px;
        border-radius: 8px;
      }

      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: linear-gradient(135deg, #4f7ef8, #38c98a);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 600;
        color: white;
        flex-shrink: 0;
      }

      .user-name {
        font-size: 13px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.85);
      }
      .user-role {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.35);
      }

      /* Main */
      .main {
        margin-left: var(--sidebar-w);
        flex: 1;
        padding: 30px;
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .btn-add {
        background: var(--accent);
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 8px;
        cursor: pointer;
      }
      .btn-add:hover {
        background: #e84379;
      }
      /* Cards */
      .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 15px;
      }

      .interview-card {
        background: white;
        padding: 18px;
        border-radius: 14px;
        border: 1px solid #f3d6e2;
      }

      .ic-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .ic-actions {
        margin-top: 10px;
        display: flex;
        gap: 8px;
      }

      .btn-sm {
        border: none;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
      }

      .btn-edit-sm {
        background: #eef2ff;
        color: #4f7ef8;
      }

      .btn-del-sm {
        background: #fdecea;
        color: #c0392b;
      }

      /* Table */
      .table-wrap {
        margin-top: 30px;
        background: white;
        border-radius: 12px;
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px;
        border-bottom: 1px solid #eee;
        text-align: left;
      }
      thead {
        background: #ffe4ec;
      }

      /* Modal */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        align-items: center;
        justify-content: center;
      }

      .modal-overlay.open {
        display: flex;
      }

      .modal {
        background: white;
        padding: 24px;
        border-radius: 14px;
        width: 400px;
      }

      .modal h3 {
        margin-bottom: 15px;
      }

      .form-group {
        margin-bottom: 12px;
      }

      .form-group label {
        display: block;
        margin-bottom: 5px;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }

      .modal-footer {
        margin-top: 15px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .btn-save {
        background: var(--accent);
        color: white;
        border: none;
        padding: 8px 14px;
        border-radius: 8px;
      }

      .btn-cancel {
        border: none;
        padding: 8px 14px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <!-- Sidebar -->

    <div class="sidebar">
      <div class="sidebar-logo">
        <h2>
          <div class="logo-icon">⚡</div>
          System
        </h2>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-label">Main</div>
        <ul>
          <li onclick="window.location.href = 'hrAdmin.html'">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                d="M2 10.5a1.5 1.5 0 113 0v6a1.5 1.5 0 01-3 0v-6zM6 10.333v5.43a2 2 0 001.106 1.79l.05.025A4 4 0 008.943 18h5.416a2 2 0 001.962-1.608l1.2-6A2 2 0 0015.56 8H12V4a2 2 0 00-2-2 1 1 0 00-1 1v.667a4 4 0 01-.8 2.4L6.8 7.933a4 4 0 00-.8 2.4z"
              />
            </svg>
            Dashboard
          </li>
        </ul>

        <div class="nav-label">Management</div>
        <ul>
          <li onclick="window.location.href = 'staff.html'">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"
              />
            </svg>
            Staff
          </li>
          <li onclick="window.location.href = 'volunteers.html'">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"
                clip-rule="evenodd"
              />
            </svg>
            Volunteers
          </li>
          <li class="active" data-page="dashboard">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z"
                clip-rule="evenodd"
              />
            </svg>
            Interview
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="avatar">A</div>
          <div>
            <div class="user-name">Admin</div>
            <div class="user-role">System Manager</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="page-header">
        <h1>Interviews</h1>
        <button class="btn-add" onclick="openModal()">+ Add Interview</button>
      </div>

      <div class="cards-grid" id="cards-grid"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Field</th>
              <th>Date</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="table-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <h3>Interview Slot</h3>

        <div class="form-group">
          <label>Field</label>
          <select id="f-field">
            <option>Tech</option>
            <option>Health</option>
            <option>Education</option>
          </select>
        </div>

        <div class="form-group">
          <label>Date</label>
          <input type="date" id="f-date" />
        </div>
        <div class="form-group">
          <label>Time</label>
          <input type="time" id="f-time" />
        </div>

        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button class="btn-save" onclick="saveInterview()">Save</button>
        </div>
      </div>
    </div>

    <script>
      let data = [
        {
          id: 1,
          field: "Tech",

          date: "2024-02-10",
          time: "10:00",
        },
      ];

      let nextId = 2;
      let editingId = null;

      function render() {
        const grid = document.getElementById("cards-grid");
        const tbody = document.getElementById("table-tbody");

        grid.innerHTML = data
          .map(
            (s) => `
  <div class="interview-card">
    <div class="ic-row"><b>${s.field}</b></div>
    <div class="ic-row">📅 ${s.date}</div>
    <div class="ic-row">⏰ ${s.time}</div>
   
    

  
  </div>
`,
          )
          .join("");

        tbody.innerHTML = data
          .map(
            (s) => `
    <tr>
   
      <td>${s.field}</td>
      <td>${s.date}</td>
       <td>${s.time}</td>
     
  
 
    </tr>
  `,
          )
          .join("");
      }

      function openModal(id = null) {
        editingId = id;

        if (id) {
          const s = data.find((x) => x.id === id);

          document.getElementById("f-field").value = s.field;
          document.getElementById("f-date").value = s.date;
          document.getElementById("f-time").value = s.time;
        } else {
          document.getElementById("f-date").value = "";
          document.getElementById("f-time").value = "";
        }

        document.getElementById("modal-overlay").classList.add("open");
      }
      function closeModal() {
        document.getElementById("modal-overlay").classList.remove("open");
      }

      function saveInterview() {
        const field = document.getElementById("f-field").value;

        const date = document.getElementById("f-date").value;
        const time = document.getElementById("f-time").value;

        if (!field || !date || !time) {
          alert("Fill all fields");
          return;
        }

        const entry = {
          id: editingId || nextId++,
          field,
          date,
          time,
        };

        if (editingId) {
          data = data.map((s) => (s.id === editingId ? entry : s));
        } else {
          data.push(entry);
        }

        closeModal();
        render();
      }

      function editItem(id) {
        openModal(id);
      }

      function deleteItem(id) {
        data = data.filter((s) => s.id !== id);
        render();
      }

      render();
    </script>
  </body>
</html>
