spring.application.name=misr_shoryan_elataa
# Datasource (SQL Server)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=MisrShoryanElAtaa;encrypt=true;trustServerCertificate=true
spring.datasource.username=SpringBoot
spring.datasource.password=SpringBoot
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=validate

# # Fix for JSR-310 converters (Hibernate 6 compatibility)
# spring.data.jpa.repositories.enabled-context-converters=false

